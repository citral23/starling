---
name: starling
description: A bird.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /
      - source: usr/lib/firmware
        destination: /usr/lib/firmware

  - type: dnf
    repos:
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      copr:
        - avengemedia/danklinux 
        - lizardbyte/beta
    install:
      packages:
        - brightnessctl
        - btop
        - cava
        - chezmoi
        - cliphist
        - ddcutil
        - dialog
        - fastfetch
        - fira-code-fonts
        - freerdp
        - gamescope
        - ImageMagick
        - jetbrainsmono-nerd-fonts
        - kitty
        - libvirt
        - mangohud
        - mediawriter
        - mpv
        - mpv-devel
        - niri
        - nmap-ncat
        - noctalia-shell
        - python3-pip
        - qemu
        - qt6ct
        - screen
        - steam
        - sunshine
        - tailscale
        - telnet
        - virt-manager
        - wlsunset
        - yazi
        - zed

    remove:
      packages:
        - htop

  - type: akmods
    install:
      - xone

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - com.ranfdev.DistroShelf
          - io.github.flattool.Ignition
          - org.gtk.Gtk3theme.adw-gtk3
          - org.gtk.Gtk3theme.adw-gtk3-dark
          - org.remmina.Remmina
          - page.codeberg.libre_menu_editor.LibreMenuEditor

  - type: signing

  - type: systemd
    system:
      enabled:
        - tailscaled
        - libvirtd
        - sshd

  - type: kargs
    kargs:
      - split_lock_detect=off
